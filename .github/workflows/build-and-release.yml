name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -scheme Maestro -configuration Release -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain-db --timestamp --options runtime"

      - name: Re-sign embedded binaries
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="build/Build/Products/Release/Maestro.app"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          IDENTITY="Developer ID Application"

          # Sign the embedded CLI binary with hardened runtime
          codesign --force --sign "$IDENTITY" \
            --keychain "$KEYCHAIN" \
            --timestamp \
            --options runtime \
            "$APP/Contents/Resources/maestro"

          # Re-sign the entire app bundle
          codesign --force --deep --sign "$IDENTITY" \
            --keychain "$KEYCHAIN" \
            --timestamp \
            --options runtime \
            --entitlements Maestro/Maestro.entitlements \
            "$APP"

          # Verify signing (notarization checked after stapling)
          codesign --verify --verbose=2 "$APP"

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "build/Build/Products/Release/Maestro.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Maestro" -srcfolder dmg-staging -ov -format UDZO Maestro.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit Maestro.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple Maestro.dmg

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          git tag latest
          git push origin latest
          gh release create latest Maestro.dmg \
            --title "Latest Build" \
            --notes "Built from $(git rev-parse --short HEAD) on $(date -u +%Y-%m-%d)" \
            --latest
